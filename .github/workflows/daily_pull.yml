name: Near-realtime LI-COR + NEWA pull

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron has ~5–15 min jitter on top,
    # so expect ~15–30 min effective latency from sensor to dashboard.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      pull_date:
        description: "Date to pull (YYYY-MM-DD). Leave blank for rolling yesterday+today window."
        required: false
        default: ""

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull LI-COR tower data
        env:
          LICOR_TOKEN: ${{ secrets.LICOR_TOKEN }}
          LICOR_DEVICE_SN: ${{ vars.LICOR_DEVICE_SN || '22411541' }}
          PULL_DATE: ${{ github.event.inputs.pull_date }}
        run: python scripts/pull_daily.py

      - name: Pull NEWA Geneva (AgriTech Gates) data
        env:
          PULL_DATE: ${{ github.event.inputs.pull_date }}
        run: python scripts/pull_newa_daily.py

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull latest in case another scheduled run landed between our checkout and push
          git pull --rebase origin main || true
          git add data/licor_*.csv data/newa/*.csv
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: auto-pull $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

concurrency:
  group: realtime-pull
  cancel-in-progress: false
